<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Word Dash (2026-03-16)</title>
  <style>
    :root{color-scheme:dark;--bg:#070a14;--fg:#eaf0ff;--muted:#a7b2e6;--card:rgba(255,255,255,.06);--b:rgba(255,255,255,.12);--accent:#7cf6ff;--danger:#ff4d6d;}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(900px 600px at 50% 35%, #131e46 0%, var(--bg) 60%);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
    .wrap{width:min(980px,94vw)}
    .top{display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px;}
    .panel{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px 14px;backdrop-filter:blur(6px)}
    h1{margin:0 0 6px;font-size:18px}
    .muted{color:var(--muted);font-size:13px;line-height:1.35}
    .stats{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
    .stats b{color:var(--fg)}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
    .big{flex:1;min-width:280px}
    .word{font-size:44px;font-weight:800;letter-spacing:.8px;margin:8px 0 10px}
    input{width:100%;font-size:18px;padding:12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:var(--fg);outline:none}
    input:focus{border-color:rgba(124,246,255,.45);box-shadow:0 0 0 3px rgba(124,246,255,.10)}
    .bar{height:12px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;border:1px solid rgba(255,255,255,.12)}
    .fill{height:100%;width:100%;background:linear-gradient(90deg, rgba(124,246,255,.95), rgba(255,230,120,.85));}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button{cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--fg);padding:8px 10px;border-radius:12px;font-weight:600}
    button:hover{background:rgba(255,255,255,.12)}
    .ok{color:rgba(120,255,140,.95)}
    .bad{color:rgba(255,110,150,.95)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="panel" style="flex:1;min-width:260px">
        <h1>Word Dash</h1>
        <div class="muted">Type the word before the timer empties. Each correct word speeds things up.<br/>Controls: just type • <b>Enter</b> submit • <b>R</b> restart • <b>P</b> pause</div>
      </div>
      <div class="panel" style="min-width:260px">
        <div class="stats">
          <div>Score: <b id="score">0</b></div>
          <div>Best: <b id="best">0</b></div>
          <div>Streak: <b id="streak">0</b></div>
        </div>
        <div class="muted" id="msg" style="margin-top:8px">Ready when you are.</div>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <div class="big">
          <div class="word" id="word">—</div>
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div class="btns">
            <button id="start">Start</button>
            <button id="restart">Restart (R)</button>
            <button id="pause">Pause/Resume (P)</button>
          </div>
        </div>
        <div class="big" style="min-width:280px">
          <div class="muted" style="margin-bottom:8px">Type here:</div>
          <input id="inp" autocomplete="off" spellcheck="false" placeholder="type the word and press Enter" />
          <div class="muted" style="margin-top:10px">Tips: accuracy matters; extra spaces count wrong. Words are lowercase.</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const words = [
    'nebula','velocity','cobalt','zigzag','pixel','turbine','socket','quantum','garden','lantern',
    'fractals','harmony','mystery','monsoon','saffron','voyager','cascade','banyan','aurora','crystal',
    'orbit','signal','mango','breeze','yonder','galaxy','circuit','comet','spectrum','matrix'
  ];

  const wordEl = document.getElementById('word');
  const fillEl = document.getElementById('fill');
  const inp = document.getElementById('inp');
  const msg = document.getElementById('msg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const streakEl = document.getElementById('streak');

  const LS='wordDashBest';
  let best = +localStorage.getItem(LS) || 0;

  let running=false;
  let paused=false;
  let score=0;
  let streak=0;
  let cur='';
  let t=0;
  let limit=3.6; // seconds, shrinks

  function pick(){
    cur = words[Math.floor(Math.random()*words.length)];
    wordEl.textContent = cur;
    inp.value='';
    inp.focus();
    t=0;
  }

  function setMsg(text, cls=''){
    msg.className='muted ' + cls;
    msg.textContent=text;
  }

  function sync(){
    scoreEl.textContent=score;
    bestEl.textContent=best;
    streakEl.textContent=streak;
  }

  function reset(){
    running=false; paused=false;
    score=0; streak=0; limit=3.6;
    setMsg('Ready when you are.');
    wordEl.textContent='—';
    fillEl.style.width='100%';
    sync();
  }

  function start(){
    if(running) return;
    running=true; paused=false;
    setMsg('Go!', 'ok');
    pick();
  }

  function gameOver(){
    running=false;
    if(score>best){ best=score; localStorage.setItem(LS,String(best)); }
    setMsg('Time! Press Start or R to try again.', 'bad');
    sync();
  }

  function submit(){
    if(!running || paused) return;
    if(inp.value === cur){
      score += 1;
      streak += 1;
      limit = Math.max(1.35, limit*0.95);
      setMsg('Nice.', 'ok');
      sync();
      pick();
    } else {
      streak = 0;
      setMsg('Wrong. Try the next one.', 'bad');
      sync();
      pick();
    }
  }

  document.getElementById('start').onclick = start;
  document.getElementById('restart').onclick = () => { reset(); start(); };
  document.getElementById('pause').onclick = () => { if(running) paused=!paused; setMsg(paused?'Paused.':'Go!', paused?'':'ok'); };

  addEventListener('keydown', (e) => {
    const k=e.key.toLowerCase();
    if(k==='r'){ reset(); start(); }
    if(k==='p' && running){ paused=!paused; setMsg(paused?'Paused.':'Go!', paused?'':'ok'); }
    if(e.key==='Enter') submit();
  });

  function loop(ts){
    loop.last ??= ts;
    const dt = Math.min(0.05, (ts-loop.last)/1000);
    loop.last = ts;

    if(running && !paused){
      t += dt;
      const left = Math.max(0, 1 - t/limit);
      fillEl.style.width = (left*100).toFixed(1) + '%';
      if(left<=0.0001) gameOver();
    }

    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
