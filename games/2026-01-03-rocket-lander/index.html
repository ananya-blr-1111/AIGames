<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Rocket Lander (2026-01-03)</title>
  <style>
    :root{color-scheme:dark;--bg:#070a14;--fg:#eaf0ff;--muted:#a7b2e6;--card:rgba(255,255,255,.06);--b:rgba(255,255,255,.12);--accent:#7cf6ff;--danger:#ff4d6d;}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(900px 600px at 50% 35%, #131e46 0%, var(--bg) 60%);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
    .wrap{width:min(980px,94vw)}
    .top{display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px;}
    .panel{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px 14px;backdrop-filter:blur(6px)}
    h1{margin:0 0 6px;font-size:18px}
    .muted{color:var(--muted);font-size:13px;line-height:1.35}
    .stats{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
    .stats b{color:var(--fg)}
    canvas{width:100%;aspect-ratio:16/9;background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.70));border:1px solid rgba(255,255,255,.14);border-radius:16px;display:block}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--fg);padding:8px 10px;border-radius:12px;font-weight:600}
    button:hover{background:rgba(255,255,255,.12)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="panel" style="flex:1;min-width:260px">
        <h1>Rocket Lander</h1>
        <div class="muted">
          Land softly on the pad. Too fast = crash.
          <br/>Controls: <b>↑</b>/<b>W</b> thrust • <b>←/→</b> or <b>A/D</b> tilt • <b>R</b> restart • <b>P</b> pause
        </div>
      </div>
      <div class="panel" style="min-width:260px">
        <div class="stats">
          <div>Fuel: <b id="fuel">100</b>%</div>
          <div>Speed: <b id="spd">0</b></div>
          <div>Best landings: <b id="best">0</b></div>
          <div>Status: <b id="status">flying</b></div>
        </div>
      </div>
    </div>

    <canvas id="c" width="1280" height="720"></canvas>
    <div class="btns">
      <button id="restart">Restart (R)</button>
      <button id="pause">Pause/Resume (P)</button>
    </div>
    <div class="muted" style="margin-top:8px">Folder date: 2026-01-03 (past-date entry).</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = () => canvas.width, H = () => canvas.height;

  const elFuel = document.getElementById('fuel');
  const elSpd = document.getElementById('spd');
  const elBest = document.getElementById('best');
  const elStatus = document.getElementById('status');

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  const keys=new Set();
  addEventListener('keydown',(e)=>{
    const k=e.key.toLowerCase();
    if(['arrowup','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    keys.add(k);
    if(k==='r') reset();
    if(k==='p') togglePause();
  },{passive:false});
  addEventListener('keyup',(e)=>keys.delete(e.key.toLowerCase()));

  document.getElementById('restart').onclick = () => reset();
  document.getElementById('pause').onclick = () => togglePause();

  let paused=false;
  let landings=0;
  const LS='rocketLanderBest';
  let best=+localStorage.getItem(LS)||0;
  elBest.textContent=best;

  const rocket={x:0,y:0,vx:0,vy:0,ang:0,angV:0,w:22,h:46,fuel:100};

  const ground = { y: () => H()*0.88 };
  const pad = { x: () => W()*0.70, w: 140, h: 14 };

  let state='flying'; // flying|landed|crashed

  function reset(){
    paused=false;
    state='flying';
    rocket.x=W()*0.28; rocket.y=H()*0.20;
    rocket.vx=140; rocket.vy=0;
    rocket.ang=0; rocket.angV=0;
    rocket.fuel=100;
    elStatus.textContent='flying';
  }

  function togglePause(){
    if(state!=='flying') return;
    paused=!paused;
  }

  function update(dt){
    if(paused || state!=='flying') return;

    // inputs
    const thrust = (keys.has('arrowup')||keys.has('w')) && rocket.fuel>0;
    const left = keys.has('arrowleft')||keys.has('a');
    const right = keys.has('arrowright')||keys.has('d');

    if(left) rocket.angV -= 3.2*dt;
    if(right) rocket.angV += 3.2*dt;
    rocket.angV *= Math.pow(0.25, dt);
    rocket.ang = clamp(rocket.ang + rocket.angV, -0.9, 0.9);

    // physics
    const g = 520;
    rocket.vy += g*dt;

    if(thrust){
      const p = 820;
      rocket.vx += Math.sin(rocket.ang) * p * dt;
      rocket.vy += -Math.cos(rocket.ang) * p * dt;
      rocket.fuel = Math.max(0, rocket.fuel - 24*dt);
    }

    // damping
    rocket.vx *= Math.pow(0.92, dt);

    rocket.x += rocket.vx*dt;
    rocket.y += rocket.vy*dt;

    // bounds
    if(rocket.x<30){ rocket.x=30; rocket.vx*=-0.35; }
    if(rocket.x>W()-30){ rocket.x=W()-30; rocket.vx*=-0.35; }

    // ground collision
    const bottom = rocket.y + rocket.h/2;
    const gy = ground.y();
    if(bottom >= gy){
      rocket.y = gy - rocket.h/2;
      // check landing on pad
      const px = pad.x();
      const onPad = Math.abs(rocket.x - px) < pad.w/2 - 10;
      const speed = Math.hypot(rocket.vx, rocket.vy);
      const safe = speed < 210 && Math.abs(rocket.ang) < 0.25;

      if(onPad && safe){
        state='landed';
        landings += 1;
        if(landings>best){ best=landings; localStorage.setItem(LS,String(best)); }
        elBest.textContent=best;
        elStatus.textContent='landed';
      } else {
        state='crashed';
        elStatus.textContent='crashed';
      }
      rocket.vx=0; rocket.vy=0; rocket.angV=0;
    }

    // UI
    elFuel.textContent = Math.round(rocket.fuel);
    elSpd.textContent = Math.round(Math.hypot(rocket.vx, rocket.vy));
  }

  function draw(){
    ctx.clearRect(0,0,W(),H());

    // stars
    ctx.save();
    ctx.globalAlpha=0.25;
    for(let i=0;i<70;i++){
      const x=(i*97)%W();
      const y=(i*173)%H();
      const r=1+((i*11)%2);
      ctx.fillStyle='white';
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // ground
    const gy = ground.y();
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(0, gy, W(), H()-gy);

    // landing pad
    const px = pad.x();
    ctx.fillStyle='rgba(124,246,255,0.35)';
    ctx.fillRect(px-pad.w/2, gy-pad.h, pad.w, pad.h);
    ctx.fillStyle='rgba(124,246,255,0.15)';
    ctx.fillRect(px-pad.w/2, gy-pad.h-10, pad.w, 6);

    // rocket
    ctx.save();
    ctx.translate(rocket.x, rocket.y);
    ctx.rotate(rocket.ang);

    // body
    ctx.fillStyle='rgba(231,245,255,0.88)';
    ctx.fillRect(-rocket.w/2, -rocket.h/2, rocket.w, rocket.h);

    // window
    ctx.fillStyle='rgba(124,246,255,0.75)';
    ctx.beginPath();
    ctx.arc(0, -6, 6, 0, Math.PI*2);
    ctx.fill();

    // legs
    ctx.strokeStyle='rgba(231,245,255,0.75)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(-rocket.w/2, rocket.h/2-6); ctx.lineTo(-rocket.w/2-14, rocket.h/2+10);
    ctx.moveTo( rocket.w/2, rocket.h/2-6); ctx.lineTo( rocket.w/2+14, rocket.h/2+10);
    ctx.stroke();

    // flame
    const thrust = (keys.has('arrowup')||keys.has('w')) && rocket.fuel>0 && !paused && state==='flying';
    if(thrust){
      ctx.fillStyle='rgba(255,230,120,0.9)';
      ctx.beginPath();
      ctx.moveTo(-7, rocket.h/2);
      ctx.lineTo( 7, rocket.h/2);
      ctx.lineTo( 0, rocket.h/2 + 22 + Math.random()*8);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();

    if(paused && state==='flying') overlay('Paused', 'Press P to resume');
    if(state==='landed') overlay('Landed!', 'Press R to fly again');
    if(state==='crashed') overlay('Crashed', 'Too fast or missed the pad. Press R');
  }

  function overlay(title, subtitle){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W(),H());
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.font='700 56px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(title, W()/2, H()/2 - 10);
    ctx.fillStyle='rgba(255,255,255,0.78)';
    ctx.font='500 18px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(subtitle, W()/2, H()/2 + 34);
    ctx.restore();
  }

  function loop(ts){
    loop.last ??= ts;
    const dt = Math.min(0.04, (ts-loop.last)/1000);
    loop.last = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
